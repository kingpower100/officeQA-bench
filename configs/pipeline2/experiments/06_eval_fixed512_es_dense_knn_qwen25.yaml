extends: "../base_eval.yaml"

evaluation:
  eval_run_id: "06_eval_fixed512_es_dense_knn_qwen25"
  output_dir: "data/eval/runs/pipeline2"
  retrieval_only: false
  retrieval_eval_field: "retrieved_file_names"
  max_generation_failure_rate: 0.05
  strict_failure_threshold: false

inputs:
  rag_outputs:
    - "data/runs/pipeline1/06_fixed512_es_dense_knn_qwen25/results.jsonl"
  qa_path: "data/raw/qa_test.jsonl"
  gold_contexts_path: "data/raw/ground_truth_contexts.jsonl"

retrieval:
  k: 5
  ks: [1, 3, 5, 10]

leaderboard:
  sort_metric: "mean_numeric_accuracy"
  sort_ascending: false

runtime:
  overwrite: true
  save_csv: true

