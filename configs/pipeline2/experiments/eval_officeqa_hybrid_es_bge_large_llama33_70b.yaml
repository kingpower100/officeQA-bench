extends: "../base_eval.yaml"

evaluation:
  eval_run_id: "eval_officeqa_hybrid_es_bge_large_llama33_70b"
  output_dir: "data/eval/runs/pipeline2"

inputs:
  rag_outputs:
    - "data/runs/pipeline1/officeqa_hybrid_es_bge_large_llama33_70b/results.jsonl"
  qa_path: "data/raw/qa_test.jsonl"
  gold_contexts_path: "data/raw/ground_truth_contexts.jsonl"

retrieval:
  k: 5
  ks: [1, 3, 5, 10]

answer_quality:
  enable_numeric_accuracy: true
  abstention_patterns: ["UNKNOWN", "NOT FOUND", "N/A", "CANNOT DETERMINE"]

leaderboard:
  sort_metric: "mean_numeric_accuracy"
  sort_ascending: false

runtime:
  overwrite: true
  save_csv: true
