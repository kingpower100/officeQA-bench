extends: "../base.yaml"

# Real local hybrid retrieval:
# dense FAISS candidates + local BM25 candidates + Reciprocal Rank Fusion.
# Elasticsearch is intentionally not used in this first hybrid implementation.

experiment:
  experiment_id: "officeqa_hybrid_rrf_bge_large_llama33_70b"
  random_seed: 42
  output_dir: "data/runs/pipeline1"

documents:
  source_type: "txt_folder"
  path: "data/raw/transformed"
  file_glob: "*.txt"
  text_field: "cleaned_context"

data:
  questions_path: "data/raw/questions_only.jsonl"
  question_id_field: "uid"
  question_field: "question"
  allow_document_text_fallback: false
  allow_unsafe_query_fields: false
  use_ground_truth_contexts: false
  use_gold_answers: false

chunking:
  strategy: "fixed_token"
  chunk_size: 512
  chunk_overlap: 200
  tokenizer_name: "cl100k_base"
  allow_word_fallback: false

embedding:
  provider: "sentence_transformers"
  model_name: "BAAI/bge-large-en-v1.5"
  normalize_embeddings: true
  batch_size: 256
  device: "cuda"

index:
  type: "faiss"
  metric: "cosine"

retrieval:
  retriever_type: "hybrid_rrf"
  top_k: 5
  fetch_k: 50
  bm25:
    enabled: true
    k1: 1.5
    b: 0.75
  hybrid:
    rrf_k: 60
    dense_weight: 1.0
    bm25_weight: 1.0
  metadata_boosting:
    enabled: false
    company_weight: 0.3
    year_weight: 0.15
    symbol_weight: 0.2
    file_name_weight: 0.0
  metadata_filtering:
    enabled: false
    strict: false

reranker:
  enabled: true
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  final_top_k: 3

generation:
  provider: "ollama"
  model_name: "llama3.3:70b"
  base_url: "http://localhost:11434"
  temperature: 0.0
  max_tokens: 64
  timeout_s: 180
  include_metadata_headers: false
  system_prompt: |
    You are a financial question-answering system.

    Use ONLY the retrieved context to answer the question.

    Rules:
    - Return ONLY the final answer.
    - Do NOT explain your reasoning.
    - Do NOT output full sentences.
    - Do NOT use markdown.
    - Preserve decimals and negative signs.
    - Compute from the retrieved evidence when needed.
    - If the required evidence is missing, return EXACTLY: UNKNOWN

telemetry:
  estimate_cost: true
  pricing:
    input_per_1k_tokens_usd: 0.0
    output_per_1k_tokens_usd: 0.0

runtime:
  save_csv: true
  log_level: "INFO"
  resume: false
  overwrite: true
