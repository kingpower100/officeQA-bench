experiment:
  experiment_id: "exp_002_sentence512_bge_dense"
  random_seed: 42
  output_dir: "data/runs/pipeline1"

data:
  documents_path: "data/raw/documents.jsonl"
  qa_test_path: "data/raw/questions_only.jsonl"
  question_id_field: "id"
  question_field: "question"
  use_ground_truth_contexts: false
  use_gold_answers: false

chunking:
  strategy: "sentence"
  chunk_size: 512
  chunk_overlap: 200
  tokenizer_name: "cl100k_base"

embedding:
  provider: "sentence_transformers"
  model_name: "BAAI/bge-small-en-v1.5"
  normalize_embeddings: true
  batch_size: 8
  device: "cuda"

index:
  type: "faiss"
  metric: "cosine"
  faiss_factory: "Flat"
  persist_path: "data/processed/indexes/faiss"

retrieval:
  retriever_type: "dense"
  top_k: 5
  fetch_k: 20

reranker:
  enabled: true
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"

generation:
  provider: "ollama"
  model_name: "qwen2.5:7b"
  base_url: "http://localhost:11434"
  temperature: 0.0
  max_tokens: 16
  timeout_s: 180

  system_prompt: |
    You are a financial QA system specialized in numeric extraction.

    Use ONLY the retrieved context to answer the question.

    Rules:
    - Return ONLY the final answer.
    - Do NOT explain your reasoning.
    - Do NOT output full sentences.
    - Do NOT use markdown.
    - If the answer is numeric, return only the number.
    - Preserve decimals and negative signs.
    - If the answer cannot be found in the context, return EXACTLY: UNKNOWN

telemetry:
  estimate_cost: true
  pricing:
    input_per_1k_tokens_usd: 0.0
    output_per_1k_tokens_usd: 0.0

runtime:
  num_workers: 1
  save_csv: true
  log_level: "INFO"
  resume: false
  overwrite: true
