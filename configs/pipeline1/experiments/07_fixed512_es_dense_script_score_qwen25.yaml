extends: "../base.yaml"

experiment:
  experiment_id: "07_fixed512_es_dense_script_score_qwen25"
  random_seed: 42
  output_dir: "data/runs/pipeline1"

documents:
  source_type: "jsonl"
  path: "data/raw/treasury_bulletins_1939_1963.jsonl"
  text_field: "cleaned_context"

data:
  questions_path: "data/raw/questions_only.jsonl"
  question_id_field: "uid"
  question_field: "question"
  allow_document_text_fallback: false
  allow_unsafe_query_fields: false
  use_ground_truth_contexts: false
  use_gold_answers: false

chunking:
  strategy: "fixed_token"
  chunk_size: 512
  chunk_overlap: 64
  tokenizer_name: "cl100k_base"

embedding:
  provider: "sentence_transformers"
  model_name: "BAAI/bge-small-en-v1.5"
  normalize_embeddings: true
  batch_size: 128
  device: "cuda"
  require_cuda: true

index:
  type: "elasticsearch"
  host: "http://localhost:9201"
  index_name: "ragbench_07_fixed512_es_dense_script_score_qwen25"
  dense_dim: 384
  vector_field: "embedding"
  text_field: "text"
  similarity: "cosine"
  recreate: true
  retrieval_mode: "script_score"
  num_candidates: 100
  shards: 1
  replicas: 0
  refresh_after_index: true
  request_timeout: 60
  verify_certs: false
  username: null
  password: null
  api_key: null

retrieval:
  retriever_type: "elasticsearch_dense"
  top_k: 10
  fetch_k: 50
  metadata_boosting:
    enabled: false
  metadata_filtering:
    enabled: false

reranker:
  enabled: false
  model_name: null
  device: "cpu"

generation:
  provider: "ollama"
  model_name: "qwen2.5:7b"
  base_url: "http://localhost:11434"
  temperature: 0.0
  max_tokens: 64
  timeout_s: 180
  include_metadata_headers: true
  system_prompt: |
    You are a financial question-answering system.

    Use ONLY the retrieved context to answer the question.

    Rules:
    - Return ONLY the final answer.
    - Do NOT explain your reasoning.
    - Do NOT output full sentences.
    - Do NOT use markdown.
    - Preserve decimals and negative signs.
    - Compute from the retrieved evidence when needed.
    - If the required evidence is missing, return EXACTLY: UNKNOWN

runtime:
  save_csv: true
  log_level: "INFO"
  resume: false
  overwrite: true
  cache_mismatch_policy: "raise"

