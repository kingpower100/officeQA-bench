experiment:
  experiment_id: "p1_docker_host_ollama_top5"
  random_seed: 42
  output_dir: "data/runs/pipeline1"

data:
  documents_path: "data/raw/documents.jsonl"
  qa_test_path: "data/raw/qa_test.jsonl"
  question_field: "question"
  question_id_field: "id"
  use_ground_truth_contexts: false
  use_gold_answers: false

chunking:
  strategy: "fixed_token"
  chunk_size: 512
  chunk_overlap: 64
  tokenizer_name: "cl100k_base"

embedding:
  provider: "sentence_transformers"
  model_name: "BAAI/bge-small-en-v1.5"
  normalize_embeddings: true
  batch_size: 64
  device: "cpu"

index:
  type: "faiss"
  metric: "cosine"
  faiss_factory: "Flat"
  persist_path: "data/processed/indexes/faiss"

retrieval:
  retriever_type: "dense"
  top_k: 5
  fetch_k: 20

reranker:
  enabled: false
  model_name: null

generation:
  provider: "ollama"
  model_name: "qwen2.5:7b"
  base_url: "http://host.docker.internal:11434"
  temperature: 0.0
  max_tokens: 512
  timeout_s: 90
  system_prompt: |
    You are a grounded QA assistant.
    Use only the provided context chunks.
    If the answer is not in the context, say: "I don't know based on the provided context."

telemetry:
  estimate_cost: true
  pricing:
    input_per_1k_tokens_usd: 0.0
    output_per_1k_tokens_usd: 0.0

runtime:
  num_workers: 1
  save_csv: true
  log_level: "INFO"
  resume: true
